<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLens | Welcome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-home">
    <div class="landing-container">
        <header class="landing-header">
            <div class="logo-container">
                <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                <h1 class="logo-text">HealthLens</h1>
            </div>
            <nav class="auth-nav">
                <a href="{{ url_for('login') }}" class="btn-outline">Log In</a>
                <a href="{{ url_for('signup') }}" class="btn-solid">Sign Up</a>
            </nav>
        </header>

        <main class="hero-section">
            <div class="hero-content">
                <h2>Predictive Healthcare at your Fingertips</h2>
                <p>Leverage the power of Machine Learning to assess risk for Heart Disease, Diabetes, and Breast Cancer using real-time patient data.</p>
                <div class="hero-cta">
                    <a href="{{ url_for('signup') }}" class="btn-solid large-btn">Get Started Now <i class="fa-solid fa-arrow-right"></i></a>
                </div>
            </div>
            <div class="hero-graphic">
                <div class="glass-card floating-card-1">
                    <i class="fa-solid fa-heart"></i> Heart Risk
                </div>
                <div class="glass-card floating-card-2">
                    <i class="fa-solid fa-tint"></i> Diabetes Check
                </div>
                <div class="glass-card floating-card-3">
                    <i class="fa-solid fa-ribbon"></i> Cytology Analysis
                </div>
            </div>
        </main>
    </div>
</body>
</html>
